name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin123
          POSTGRES_DB: ai-chat-bot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d ai-chat-bot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        volumes:
          - ${{ github.workspace }}/docker/init:/docker-entrypoint-initdb.d

    env:
      DATABASE_URL: postgres://admin:admin123@localhost:5432/ai-chat-bot
      GEMINI_API_KEY: ci-placeholder-key
      FAQ_SEED_SECRET: ci-placeholder-secret
      # The CI Postgres service starts empty and there's no migration system
      # yet, so let TypeORM create the schema for this run.
      DB_SYNCHRONIZE: 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint "{src,apps,libs,test}/**/*.ts"

      - name: Type check / build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: e2e tests
        run: npm run test:e2e
